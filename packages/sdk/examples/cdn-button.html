<!doctype html>
<!--
  Standalone HTML demo for the @arcora/sdk drop-in <script> integration.
  Open this file directly in a browser, or host it anywhere static — no bundler,
  no npm install required. The SDK is loaded from jsDelivr's CDN mirror of npm.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Coffee · Pay with Arcora</title>
    <style>
      :root {
        --arcora-blue:  #2563ff;
        --arcora-teal:  #00c2a8;
        --arcora-slate: #0b1426;
        --arcora-gray:  #e6ecf2;
        --arcora-mute:  #5b6478;
        --arcora-border: rgba(11, 20, 38, 0.12);
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        background: #fff; color: var(--arcora-slate);
      }
      .card {
        max-width: 440px; width: 100%; padding: 40px 32px;
        border: 1px solid var(--arcora-border); border-radius: 24px; text-align: center;
      }
      .brand { font-size: 13px; font-weight: 600; color: var(--arcora-mute);
        text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px; }
      h1 { font-size: 26px; margin: 0 0 10px; }
      p  { color: var(--arcora-mute); margin: 0 0 28px; }
      .pay-btn {
        padding: 14px 32px; border-radius: 56px; border: none; cursor: pointer;
        background: var(--arcora-slate); color: #fff;
        font-weight: 600; font-size: 15px; letter-spacing: 0.16px;
        transition: background 150ms ease;
      }
      .pay-btn:hover:not(:disabled)  { background: var(--arcora-blue); }
      .pay-btn:disabled              { opacity: 0.5; cursor: not-allowed; }
      .status { margin-top: 24px; padding: 12px 16px; border-radius: 12px; font-size: 14px; text-align: left; }
      .status.success { background: #ecfdf5; color: #047857; }
      .status.error   { background: #fee2e2; color: #991b1b; }
      .footer { margin-top: 32px; font-size: 12px; color: var(--arcora-mute); }
      .footer a { color: var(--arcora-blue); text-decoration: none; font-weight: 500; }
      code { background: var(--arcora-gray); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">☕ Acme Coffee</div>
      <h1>One americano, please.</h1>
      <p>€4.50 · payable in EURC on Arc Network</p>

      <button id="pay" class="pay-btn">Pay €4.50</button>
      <div id="status"></div>

      <div class="footer">
        Loaded from <code>cdn.jsdelivr.net/npm/@arcora/sdk</code><br />
        <a href="https://github.com/arcoralabs/arcorapay">View source on GitHub →</a>
      </div>
    </div>

    <!-- The SDK. One <script> tag, ~1.8 KB minified. -->
    <script src="https://cdn.jsdelivr.net/npm/@arcora/sdk@1.1/dist/arcora.global.js"></script>
    <script>
      // Replace ARCORA_API_KEY with the merchant API key provisioned in your
      // dashboard. For the marketing demo this can be a public testnet key.
      const ARCORA_API_KEY = window.location.search.includes("apikey=")
        ? new URLSearchParams(window.location.search).get("apikey")
        : "ak_live_demo_replace_me";

      Arcora.init({ apiKey: ARCORA_API_KEY, environment: "testnet" });

      const btn      = document.getElementById("pay");
      const statusEl = document.getElementById("status");

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "Loading…";
        statusEl.className = "";
        statusEl.textContent = "";
        try {
          const invoice = await Arcora.createInvoice({
            amountUsdc:  4.50,
            payInToken:  "EURC",
            successUrl:  window.location.origin + window.location.pathname + "?paid=1",
            cancelUrl:   window.location.origin + window.location.pathname + "?cancelled=1",
          });
          Arcora.openCheckout(invoice);
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "Pay €4.50";
          statusEl.className = "status error";
          statusEl.textContent = "Couldn't start checkout: " + (err && err.message ? err.message : err);
        }
      });

      // Surface the success / cancellation states from the redirect.
      const params = new URLSearchParams(window.location.search);
      if (params.get("paid") === "1") {
        statusEl.className = "status success";
        statusEl.textContent = "✓ Payment received — thanks for visiting!";
        btn.disabled = true;
        btn.textContent = "Paid";
      } else if (params.get("cancelled") === "1") {
        statusEl.className = "status error";
        statusEl.textContent = "Payment cancelled. Try again whenever you're ready.";
      }
    </script>
  </body>
</html>
